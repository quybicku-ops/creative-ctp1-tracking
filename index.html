<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟 Creative Task Manager Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        /* CSS Variables cho Theme Default (Pastel) */
        :root {
            --primary: #FFB7B2; 
            --secondary: #E2F0CB; 
            --accent: #B5EAD7; 
            --bg: #F9F9FB;
            --text: #4A4A4A;
            --border: rgba(255, 255, 255, 0.4);
            --container-bg: rgba(255, 255, 255, 0.85);
            --th-bg: rgba(255, 240, 245, 0.9);
            --th-color: #D81B60;
        }

        /* 20 Themes Colors */
        [data-theme="winter"] { --primary: #81d4fa; --bg: #e0f7fa; --text: #01579b; --container-bg: rgba(255,255,255,0.7); --th-bg: #b3e5fc; --th-color: #0277bd; }
        [data-theme="galaxy"] { --primary: #ce93d8; --bg: #0b1d3a; --text: #f3e5f5; --container-bg: rgba(20,20,50,0.8); --th-bg: #4a148c; --th-color: #ea80fc; --border: rgba(255,255,255,0.1); }
        [data-theme="forest"] { --primary: #aed581; --bg: #e8f5e9; --text: #1b5e20; --container-bg: rgba(255,255,255,0.8); --th-bg: #c8e6c9; --th-color: #2e7d32; }
        [data-theme="sunset"] { --primary: #ffab91; --bg: #fbe9e7; --text: #bf360c; --container-bg: rgba(255,255,255,0.8); --th-bg: #ffccbc; --th-color: #d84315; }
        [data-theme="ocean"] { --primary: #4dd0e1; --bg: #e0f2f1; --text: #004d40; --container-bg: rgba(255,255,255,0.8); --th-bg: #b2dfdb; --th-color: #00695c; }
        [data-theme="cyberpunk"] { --primary: #00e5ff; --bg: #212121; --text: #eeff41; --container-bg: rgba(30,30,30,0.85); --th-bg: #311b92; --th-color: #18ffff; --border: #333; }
        [data-theme="halloween"] { --primary: #ff9800; --bg: #3e2723; --text: #ffe0b2; --container-bg: rgba(0,0,0,0.6); --th-bg: #bf360c; --th-color: #ffb300; }
        [data-theme="valentine"] { --primary: #f48fb1; --bg: #fce4ec; --text: #880e4f; --container-bg: rgba(255,255,255,0.85); --th-bg: #f8bbd0; --th-color: #c2185b; }
        [data-theme="spring"] { --primary: #fff59d; --bg: #f1f8e9; --text: #33691e; --container-bg: rgba(255,255,255,0.85); --th-bg: #dcedc8; --th-color: #558b2f; }
        /* 10 New Themes */
        [data-theme="neon"] { --primary: #39ff14; --bg: #111; --text: #fff; --container-bg: rgba(20,20,20,0.85); --th-bg: #222; --th-color: #39ff14; --border: #39ff14; }
        [data-theme="coffee"] { --primary: #8d6e63; --bg: #efebe9; --text: #3e2723; --container-bg: rgba(255,255,255,0.8); --th-bg: #d7ccc8; --th-color: #4e342e; }
        [data-theme="desert"] { --primary: #e64a19; --bg: #fbe9e7; --text: #bf360c; --container-bg: rgba(255,255,255,0.85); --th-bg: #ffccbc; --th-color: #d84315; }
        [data-theme="space"] { --primary: #b388ff; --bg: #000000; --text: #e8eaf6; --container-bg: rgba(15,15,30,0.8); --th-bg: #311b92; --th-color: #b388ff; --border: rgba(255,255,255,0.1); }
        [data-theme="candy"] { --primary: #ff80ab; --bg: #f8bbd0; --text: #880e4f; --container-bg: rgba(255,255,255,0.85); --th-bg: #f48fb1; --th-color: #c2185b; }
        [data-theme="gothic"] { --primary: #b71c1c; --bg: #212121; --text: #e0e0e0; --container-bg: rgba(40,40,40,0.8); --th-bg: #000; --th-color: #ef5350; --border: #424242; }
        [data-theme="retro"] { --primary: #ffeb3b; --bg: #006064; --text: #fff; --container-bg: rgba(0,131,143,0.8); --th-bg: #004d40; --th-color: #ffeb3b; --border: #ffeb3b; }
        [data-theme="magic"] { --primary: #ffd54f; --bg: #311b92; --text: #ede7f6; --container-bg: rgba(69,39,160,0.8); --th-bg: #512da8; --th-color: #ffe082; --border: #7e57c2; }
        [data-theme="fruit"] { --primary: #ff5252; --bg: #e8f5e9; --text: #1b5e20; --container-bg: rgba(255,255,255,0.85); --th-bg: #c8e6c9; --th-color: #d32f2f; }
        [data-theme="monochrome"] { --primary: #616161; --bg: #f5f5f5; --text: #212121; --container-bg: rgba(255,255,255,0.9); --th-bg: #e0e0e0; --th-color: #000; --border: #9e9e9e; }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            transition: background-color 0.5s ease, color 0.5s ease;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        #particles {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .particle { position: absolute; animation: fall linear infinite; opacity: 0.7; }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* Glassmorphism Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: var(--container-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .controls-panel {
            display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; padding: 15px;
            background: rgba(255, 255, 255, 0.3); border-radius: 15px; align-items: center;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h1 { margin: 0; color: var(--primary); font-size: 28px; }
        .stats { background: rgba(255, 255, 255, 0.5); padding: 8px 15px; border-radius: 12px; font-weight: bold; }

        /* NÚT BẤM */
        .btn {
            background: var(--primary); color: var(--bg); border: none; padding: 10px 18px;
            border-radius: 12px; font-family: inherit; font-weight: bold; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); font-size: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); -webkit-appearance: none; appearance: none;
        }
        
        [data-theme="galaxy"] .btn, [data-theme="cyberpunk"] .btn, [data-theme="halloween"] .btn, [data-theme="neon"] .btn, [data-theme="space"] .btn, [data-theme="gothic"] .btn { color: white; }

        .btn:hover:not(:disabled) { 
            transform: translateY(-3px) scale(1.02); 
            box-shadow: 0 0 0 3px var(--container-bg), 0 0 0 6px var(--primary), 0 8px 20px rgba(0,0,0,0.15);
            filter: brightness(1.05); 
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-small { padding: 5px 10px; font-size: 12px; margin: 2px; }
        .btn-hide { background: #B0BEC5; color: white; }
        .btn-hide:hover:not(:disabled) { box-shadow: 0 0 0 3px var(--container-bg), 0 0 0 6px #B0BEC5, 0 8px 20px rgba(0,0,0,0.15); }
        .btn-delete { background: #EF5350; color: white; }
        .btn-delete:hover:not(:disabled) { box-shadow: 0 0 0 3px var(--container-bg), 0 0 0 6px #EF5350, 0 8px 20px rgba(0,0,0,0.15); }

        select.theme-select {
            padding: 10px 30px 10px 10px; border-radius: 12px; border: 1px solid var(--primary);
            background: var(--container-bg); color: var(--text); font-weight: bold; cursor: pointer;
            -webkit-appearance: none; appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 10px center; background-size: 15px; transition: all 0.3s;
        }
        select.theme-select:hover { box-shadow: 0 0 0 2px var(--container-bg), 0 0 0 4px var(--primary); }

        /* Bảng & Resize Cột */
        .table-wrapper { overflow-x: auto; border-radius: 15px; border: 1px solid var(--border); background: rgba(255, 255, 255, 0.1); }
        table { width: 100%; border-collapse: collapse; text-align: left; table-layout: fixed; }
        th, td { padding: 8px 10px; border-bottom: 1px solid var(--border); overflow: hidden; text-overflow: ellipsis; }

        th {
            background-color: var(--th-bg); color: var(--th-color); font-weight: 800; white-space: nowrap;
            cursor: pointer; position: relative; user-select: none; transition: background 0.2s;
        }
        th:hover { filter: brightness(0.95); }
        
        /* CSS kéo thả (Drag & Drop) */
        tr[draggable="true"] { cursor: grab; }
        tr[draggable="true"]:active { cursor: grabbing; }
        tr.drag-over td {
            border-top: 2px dashed var(--primary) !important;
            background-color: rgba(255, 255, 255, 0.4) !important;
        }
        tr.dragging { opacity: 0.5; background-color: var(--primary) !important; }

        /* Cột Resizer JS */
        .resizer {
            width: 5px; height: 100%; position: absolute; right: 0; top: 0;
            cursor: col-resize; user-select: none; z-index: 10;
        }
        .resizer:hover, .resizing { background-color: var(--primary); opacity: 0.6; }

        .sort-icon { font-size: 12px; margin-left: 5px; opacity: 0.5; }
        .sort-icon.active { opacity: 1; }

        tr.is-hidden-row { opacity: 0.4; background-color: rgba(0,0,0,0.05); }
        tr:hover td { background-color: rgba(255, 255, 255, 0.2); }

        /* FORM INPUTS */
        input[type="text"], input[type="date"], select.data-input {
            width: 100%; border: 2px solid transparent; background: rgba(255,255,255,0.4);
            font-family: inherit; color: var(--text); border-radius: 8px; transition: all 0.2s;
            box-sizing: border-box; -webkit-appearance: none; appearance: none;
        }
        input[type="text"], input[type="date"] { padding: 8px 10px; }
        select.data-input {
            padding: 8px 25px 8px 10px; 
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 8px center; background-size: 14px;
        }
        input[type="text"]:hover:not(:disabled), select.data-input:hover:not(:disabled), input[type="date"]:hover:not(:disabled) {
            background: rgba(255,255,255,0.8); border: 2px solid var(--primary); transform: scale(1.02);
        }
        input[type="text"]:focus, select.data-input:focus, input[type="date"]:focus {
            outline: none; border: 2px solid var(--primary); background: var(--container-bg);
            box-shadow: 0 0 0 2px var(--container-bg), 0 0 0 5px var(--primary); transform: scale(1.03); 
        }
        input:disabled, select:disabled { opacity: 0.7; cursor: not-allowed; }

        input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--primary); cursor: pointer; transition: transform 0.2s; }
        input[type="checkbox"]:hover:not(:disabled) { transform: scale(1.2); box-shadow: 0 0 10px var(--primary); }

        .col-stt { width: 60px; text-align: center; }
        .col-action { width: 140px; text-align: center; }
        #loader { text-align: center; padding: 50px; font-size: 18px; font-weight: bold; }

        /* MODAL OPTIONS MANAGER */
        .modal {
            display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5); backdrop-filter: blur(5px);
        }
        .modal-content {
            background: var(--container-bg); color: var(--text); margin: 5% auto; padding: 30px;
            border-radius: 20px; width: 90%; max-width: 500px; border: 2px solid var(--primary);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .close-modal { float: right; font-size: 28px; font-weight: bold; cursor: pointer; color: var(--text); }
        .close-modal:hover { color: var(--primary); }
        .opt-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .opt-row input { flex-grow: 1; border: 1px solid var(--border); }
        .modal h2 { margin-top: 0; color: var(--primary); }

        /* TOAST NOTIFICATION */
        #toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }
        .toast {
            background: var(--container-bg);
            color: var(--text);
            border-left: 5px solid var(--primary);
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            font-weight: bold;
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.4s ease;
            opacity: 0;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .toast.show {
            transform: translateX(0);
            opacity: 1;
        }
    </style>
</head>
<body data-theme="pastel">

<div id="particles"></div>
<div id="toast-container"></div>

<div class="container">
    <div class="header">
        <h1>✨ Creative Task Manager</h1>
        <div class="stats" id="statsDisplay">Đang tải dữ liệu...</div>
    </div>

    <div class="controls-panel">
        <button class="btn" onclick="addNewTask()" id="addBtn">➕ Thêm Task Mới</button>
        <button class="btn" id="lockBtn" onclick="toggleLock()">🔓 Đang Mở Edit</button>
        <button class="btn" id="showHiddenBtn" onclick="toggleShowHidden()">👁️ Đang Ẩn Task Đã Xóa</button>
        <button class="btn" onclick="openOptionsManager()" style="background: var(--th-color);">⚙️ Quản lý Danh mục</button>
        
        <select class="theme-select" id="themeSelect" onchange="changeTheme(this.value)">
            <option value="pastel">🌸 Theme: Pastel (Mặc định)</option>
            <option value="winter">❄️ Theme: Mùa Đông</option>
            <option value="galaxy">🌌 Theme: Dải Ngân Hà</option>
            <option value="forest">🍃 Theme: Rừng Xanh</option>
            <option value="sunset">🌅 Theme: Hoàng Hôn</option>
            <option value="ocean">🫧 Theme: Đại Dương</option>
            <option value="cyberpunk">⚡ Theme: Cyberpunk</option>
            <option value="halloween">🎃 Theme: Halloween</option>
            <option value="valentine">💖 Theme: Valentine</option>
            <option value="spring">🌷 Theme: Mùa Xuân</option>
            <option value="neon">🚥 Theme: Neon City</option>
            <option value="coffee">☕ Theme: Cà phê</option>
            <option value="desert">🌵 Theme: Sa Mạc</option>
            <option value="space">🚀 Theme: Vũ Trụ Đêm</option>
            <option value="candy">🍬 Theme: Kẹo Ngọt</option>
            <option value="gothic">🕸️ Theme: Gothic</option>
            <option value="retro">📻 Theme: Retro 80s</option>
            <option value="magic">🔮 Theme: Phép Thuật</option>
            <option value="fruit">🍉 Theme: Trái Cây</option>
            <option value="monochrome">⚪ Theme: Trắng Đen</option>
        </select>
        
        <button class="btn" id="animBtn" onclick="toggleAnimation()">✨ Tắt Hiệu Ứng</button>
    </div>

    <div id="loader">Đang kết nối Firebase... 🚀</div>

    <div class="table-wrapper" id="tableContainer" style="display: none;">
        <table>
            <thead>
                <tr>
                    <th class="col-stt">STT</th>
                    <th onclick="setSort('pillar')">🏷️ Pillar/Type <span class="sort-icon" id="sort-pillar">↕</span></th>
                    <th onclick="setSort('concept')">📝 Tên Concept <span class="sort-icon" id="sort-concept">↕</span></th>
                    <th onclick="setSort('link')">🔗 Link Thành Phẩm <span class="sort-icon" id="sort-link">↕</span></th>
                    <th onclick="setSort('ready')" style="text-align: center;">✅ Ready? <span class="sort-icon" id="sort-ready">↕</span></th>
                    <th onclick="setSort('format')">🎨 Format <span class="sort-icon" id="sort-format">↕</span></th>
                    <th onclick="setSort('pic')">🧑‍💻 PIC <span class="sort-icon" id="sort-pic">↕</span></th>
                    <th onclick="setSort('deadline')">📅 Deadline <span class="sort-icon" id="sort-deadline">↕</span></th>
                    <th class="col-action">⚙️ Thao tác</th>
                </tr>
            </thead>
            <tbody id="taskTableBody"></tbody>
        </table>
    </div>
</div>

<div id="optionsModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeOptionsManager()">&times;</span>
        <h2>⚙️ Quản lý Danh mục Option</h2>
        <div style="margin-bottom: 15px;">
            <label><strong>Chọn cột cần chỉnh sửa:</strong></label>
            <select class="data-input" id="manageCategorySelect" onchange="renderOptionsManagerList()">
                <option value="pillar">🏷️ Pillar/Type</option>
                <option value="format">🎨 Format</option>
                <option value="pic">🧑‍💻 PIC</option>
            </select>
        </div>
        <div id="optionsListContainer" style="max-height: 300px; overflow-y: auto; padding-right: 10px;"></div>
        <button class="btn" style="margin-top: 15px; width: 100%;" onclick="addOptionToManager()">➕ Thêm lựa chọn mới</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://creatives-ctp1-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const tasksRef = db.ref('tasks');
    const optionsRef = db.ref('settings/options');

    let rawTasksData = {};
    let isLocked = false;
    let isShowingHidden = false;
    let currentSort = { field: null, asc: null }; 
    let draggedRowId = null; // Biến lưu dòng đang kéo
    
    let globalOptions = {
        pillar: ["Research", "AI Gen", "Branding", "Design", "Social", "Production", "Animation", "Anime", "Khác"],
        format: ["Banner", "Video", "Image", "Chưa rõ"],
        pic: ["Bảo", "Lam", "Cả hai", "Chưa có"]
    };

    const tableBody = document.getElementById('taskTableBody');
    const loader = document.getElementById('loader');
    const tableContainer = document.getElementById('tableContainer');
    const statsDisplay = document.getElementById('statsDisplay');

    // --- HỆ THỐNG TOAST NOTIFICATION ---
    function showToast(message) {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = message;
        container.appendChild(toast);
        
        // Trigger reflow để animation chạy
        void toast.offsetWidth;
        toast.classList.add('show');
        
        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 400);
        }, 4000);
    }

    optionsRef.on('value', (snapshot) => {
        if(snapshot.exists()) globalOptions = snapshot.val();
        else optionsRef.set(globalOptions);
        renderTable();
        if(document.getElementById('optionsModal').style.display === 'block') renderOptionsManagerList();
    });

    tasksRef.on('value', (snapshot) => {
        rawTasksData = snapshot.val() || {};
        renderTable();
    });

    function getOptionsHtml(type, selectedValue) {
        let html = globalOptions[type].map(opt => `<option value="${opt}" ${opt === selectedValue ? 'selected' : ''}>${opt}</option>`).join('');
        if (selectedValue && !globalOptions[type].includes(selectedValue) && selectedValue !== "") {
            html = `<option value="${selectedValue}" selected>${selectedValue} (Đã xóa)</option>` + html;
        }
        if (!selectedValue) html = `<option value="" selected>-- Chọn --</option>` + html;
        return html;
    }

    function handleSelectChange(id, field, selectElement) {
        updateTask(id, field, selectElement.value);
    }

    function toggleLock() {
        isLocked = !isLocked;
        document.getElementById('lockBtn').innerHTML = isLocked ? "🔒 Đã Khóa Edit" : "🔓 Đang Mở Edit";
        document.getElementById('lockBtn').style.background = isLocked ? "#9E9E9E" : "var(--primary)";
        document.getElementById('addBtn').disabled = isLocked;
        renderTable();
        showToast(isLocked ? "🔒 Đã khóa Edit an toàn!" : "🔓 Đã mở khóa Edit! (Bạn có thể kéo thả để sắp xếp vị trí)");
    }

    function toggleShowHidden() {
        isShowingHidden = !isShowingHidden;
        document.getElementById('showHiddenBtn').innerHTML = isShowingHidden ? "🙈 Đang Hiện Task Đã Xóa" : "👁️ Đang Ẩn Task Đã Xóa";
        renderTable();
        showToast(isShowingHidden ? "🙈 Đang hiển thị các task đã xóa!" : "👁️ Đã ẩn các task đã xóa!");
    }

    function setSort(field) {
        if (currentSort.field === field) {
            if(currentSort.asc === true) currentSort.asc = false; 
            else { currentSort.field = null; currentSort.asc = null; } 
        } else {
            currentSort.field = field;
            currentSort.asc = true; 
        }
        
        document.querySelectorAll('.sort-icon').forEach(el => { el.innerText = '↕'; el.classList.remove('active'); });
        if(currentSort.field) {
            const activeIcon = document.getElementById('sort-' + field);
            if(activeIcon) {
                activeIcon.innerText = currentSort.asc ? '⬆' : '⬇';
                activeIcon.classList.add('active');
            }
        }
        renderTable();
        showToast(currentSort.field ? `🔄 Đang sắp xếp theo cột đã chọn!` : "🔄 Đã bỏ chế độ sắp xếp, quay về mặc định.");
    }

    // --- LOGIC KÉO THẢ (DRAG & DROP) ---
    function handleDragStart(e) {
        draggedRowId = e.currentTarget.getAttribute('data-id');
        e.currentTarget.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', draggedRowId);
    }

    function handleDragOver(e) {
        e.preventDefault(); 
        e.dataTransfer.dropEffect = 'move';
    }

    function handleDragEnter(e) {
        e.preventDefault();
        const tr = e.currentTarget;
        if (tr && tr.getAttribute('data-id') !== draggedRowId) {
            tr.classList.add('drag-over');
        }
    }

    function handleDragLeave(e) {
        const tr = e.currentTarget;
        if (tr && !tr.contains(e.relatedTarget)) {
            tr.classList.remove('drag-over');
        }
    }

    function handleDrop(e) {
        e.preventDefault();
        const targetRow = e.currentTarget;
        targetRow.classList.remove('drag-over');
        if(!targetRow) return;
        const targetId = targetRow.getAttribute('data-id');
        if(draggedRowId === targetId || !draggedRowId) return;

        reorderTasks(draggedRowId, targetId);
    }

    function handleDragEnd(e) {
        e.currentTarget.classList.remove('dragging');
        document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    }

    function reorderTasks(draggedId, targetId) {
        let tasksArray = Object.entries(rawTasksData).map(([id, task]) => ({ id, ...task }));
        
        // Sắp xếp theo order mặc định hiện tại
        tasksArray.sort((a, b) => {
            let valA = a.order !== undefined ? a.order : (a.createdAt || a.id);
            let valB = b.order !== undefined ? b.order : (b.createdAt || b.id);
            if (typeof valA === "number" && typeof valB === "number") return valA - valB;
            if (valA < valB) return -1;
            if (valA > valB) return 1;
            return 0;
        });

        const draggedIdx = tasksArray.findIndex(t => t.id === draggedId);
        const targetIdx = tasksArray.findIndex(t => t.id === targetId);

        if(draggedIdx === -1 || targetIdx === -1) return;

        // Cắt task được kéo và chèn vào vị trí mới
        const [draggedTask] = tasksArray.splice(draggedIdx, 1);
        tasksArray.splice(targetIdx, 0, draggedTask);

        // Ghi lại order mới cho tất cả các task
        let updates = {};
        tasksArray.forEach((task, index) => {
            updates['tasks/' + task.id + '/order'] = index;
            rawTasksData[task.id].order = index; // Cập nhật local ngay lập tức
        });

        db.ref().update(updates);
        renderTable();
        showToast("🔄 Đã thay đổi vị trí Task thành công!");
    }

    function renderTable() {
        if (Object.keys(rawTasksData).length === 0 && !loader.style.display) return;
        
        loader.style.display = 'none';
        tableContainer.style.display = 'block';

        let tasksArray = Object.entries(rawTasksData).map(([id, task]) => ({ id, ...task }));
        if (!isShowingHidden) tasksArray = tasksArray.filter(t => !t.isHidden);

        const total = tasksArray.length;
        const readyCount = tasksArray.filter(t => t.ready).length;
        statsDisplay.innerHTML = `Đã xong: ${readyCount} / ${total} 🚀`;

        if(currentSort.field) {
            tasksArray.sort((a, b) => {
                let valA = a[currentSort.field] || "";
                let valB = b[currentSort.field] || "";
                if (currentSort.field === 'ready') { valA = a.ready ? 1 : 0; valB = b.ready ? 1 : 0; }
                if (valA < valB) return currentSort.asc ? -1 : 1;
                if (valA > valB) return currentSort.asc ? 1 : -1;
                return 0;
            });
        } else {
            // Sắp xếp mặc định theo order hoặc thời gian tạo
            tasksArray.sort((a, b) => {
                let valA = a.order !== undefined ? a.order : (a.createdAt || a.id);
                let valB = b.order !== undefined ? b.order : (b.createdAt || b.id);
                if (typeof valA === "number" && typeof valB === "number") return valA - valB;
                if (valA < valB) return -1;
                if (valA > valB) return 1;
                return 0;
            });
        }

        tableBody.innerHTML = '';
        if(tasksArray.length === 0) {
             tableBody.innerHTML = `<tr><td colspan="9" style="text-align:center;">Chưa có task nào để hiển thị! 🥺</td></tr>`;
             return;
        }

        const canDrag = !isLocked && !currentSort.field;

        tasksArray.forEach((task, index) => {
            const tr = document.createElement('tr');
            if (task.isHidden) tr.classList.add('is-hidden-row');
            const dis = isLocked ? 'disabled' : '';

            // Thêm các thuộc tính kéo thả (Drag & Drop)
            if (canDrag) {
                tr.setAttribute('draggable', 'true');
                tr.setAttribute('data-id', task.id);
                tr.ondragstart = handleDragStart;
                tr.ondragover = handleDragOver;
                tr.ondragenter = handleDragEnter;
                tr.ondragleave = handleDragLeave;
                tr.ondrop = handleDrop;
                tr.ondragend = handleDragEnd;
            }

            tr.innerHTML = `
                <td class="col-stt"><strong>${index + 1}</strong></td>
                <td><select class="data-input" ${dis} onchange="handleSelectChange('${task.id}', 'pillar', this)">${getOptionsHtml('pillar', task.pillar)}</select></td>
                <td><input type="text" ${dis} value="${task.concept || ''}" placeholder="Nhập concept..." onblur="updateTask('${task.id}', 'concept', this.value)"></td>
                <td><input type="text" ${dis} value="${task.link || ''}" placeholder="Link..." onblur="updateTask('${task.id}', 'link', this.value)"></td>
                <td style="text-align: center;"><input type="checkbox" ${dis} ${task.ready ? 'checked' : ''} onchange="updateTask('${task.id}', 'ready', this.checked)"></td>
                <td><select class="data-input" ${dis} onchange="handleSelectChange('${task.id}', 'format', this)">${getOptionsHtml('format', task.format)}</select></td>
                <td><select class="data-input" ${dis} onchange="handleSelectChange('${task.id}', 'pic', this)">${getOptionsHtml('pic', task.pic)}</select></td>
                <td><input type="date" ${dis} value="${task.deadline || ''}" onchange="updateTask('${task.id}', 'deadline', this.value)"></td>
                <td class="col-action">
                    <button class="btn btn-small btn-hide" ${dis} onclick="toggleHideTask('${task.id}', ${task.isHidden})">${task.isHidden ? 'Khôi phục' : 'Ẩn'}</button>
                    <button class="btn btn-small btn-delete" ${dis} onclick="deleteTask('${task.id}')">Xóa</button>
                </td>
            `;
            tableBody.appendChild(tr);
        });
        
        initResizableColumns();
    }

    function initResizableColumns() {
        const cols = document.querySelectorAll('th');
        document.querySelectorAll('.resizer').forEach(el => el.remove());
        
        cols.forEach(col => {
            const resizer = document.createElement('div');
            resizer.classList.add('resizer');
            col.appendChild(resizer);
            
            let x = 0, w = 0;
            const mouseDownHandler = function(e) {
                x = e.clientX;
                const styles = window.getComputedStyle(col);
                w = parseInt(styles.width, 10);
                document.addEventListener('mousemove', mouseMoveHandler);
                document.addEventListener('mouseup', mouseUpHandler);
                resizer.classList.add('resizing');
                e.stopPropagation(); 
            };
            const mouseMoveHandler = function(e) {
                const dx = e.clientX - x;
                col.style.width = `${w + dx}px`;
            };
            const mouseUpHandler = function() {
                document.removeEventListener('mousemove', mouseMoveHandler);
                document.removeEventListener('mouseup', mouseUpHandler);
                resizer.classList.remove('resizing');
            };
            resizer.addEventListener('mousedown', mouseDownHandler);
            resizer.addEventListener('click', e => e.stopPropagation());
        });
    }

    function updateTask(id, field, value) {
        if(isLocked) return;
        db.ref('tasks/' + id).update({ [field]: value });
    }

    function addNewTask() {
        if(isLocked) return;
        const timestamp = Date.now();
        tasksRef.push({ pillar: "", concept: "", link: "", ready: false, format: "", pic: "", deadline: "", isHidden: false, order: timestamp, createdAt: timestamp });
        showToast("📝 Task mới đã được thêm! Hãy kéo xuống cuối danh sách để điền nhé.");
    }

    function toggleHideTask(id, currentStatus) {
        if(isLocked) return;
        db.ref('tasks/' + id).update({ isHidden: !currentStatus });
        showToast(!currentStatus ? "👻 Đã ẩn task thành công!" : "♻️ Đã khôi phục task!");
    }

    function deleteTask(id) {
        if(isLocked) return;
        if (confirm("Xóa vĩnh viễn task này? (Khuyên dùng nút Ẩn thay vì Xóa) 🥺")) {
            db.ref('tasks/' + id).remove();
            showToast("🗑️ Đã xóa vĩnh viễn task!");
        }
    }

    function openOptionsManager() { document.getElementById('optionsModal').style.display = 'block'; renderOptionsManagerList(); }
    function closeOptionsManager() { document.getElementById('optionsModal').style.display = 'none'; }
    
    function renderOptionsManagerList() {
        const cat = document.getElementById('manageCategorySelect').value;
        const container = document.getElementById('optionsListContainer');
        container.innerHTML = '';
        if(!globalOptions[cat]) globalOptions[cat] = [];
        
        globalOptions[cat].forEach((opt, idx) => {
            container.innerHTML += `
                <div class="opt-row">
                    <input type="text" value="${opt}" id="opt_${cat}_${idx}">
                    <button class="btn btn-small" style="background:var(--accent); color:#000;" onclick="saveOption('${cat}', ${idx})">💾 Lưu</button>
                    <button class="btn btn-small btn-delete" onclick="deleteOption('${cat}', ${idx})">❌</button>
                </div>`;
        });
    }

    function saveOption(cat, idx) {
        const newVal = document.getElementById(`opt_${cat}_${idx}`).value.trim();
        if(!newVal) return alert("Không được để trống!");
        const oldVal = globalOptions[cat][idx];
        if(newVal === oldVal) return; 

        globalOptions[cat][idx] = newVal;
        optionsRef.update({ [cat]: globalOptions[cat] });
        
        let updates = {};
        Object.keys(rawTasksData).forEach(taskId => {
            if(rawTasksData[taskId][cat] === oldVal) {
                updates[`tasks/${taskId}/${cat}`] = newVal;
            }
        });
        if(Object.keys(updates).length > 0) db.ref().update(updates);
        showToast("💾 Đã lưu thay đổi danh mục!");
    }

    function deleteOption(cat, idx) {
        if(confirm("Bạn có chắc muốn xóa option này? (Các task cũ vẫn sẽ giữ text nhưng hiển thị là Đã xóa)")) {
            globalOptions[cat].splice(idx, 1);
            optionsRef.update({ [cat]: globalOptions[cat] });
            showToast("🗑️ Đã xóa option thành công!");
        }
    }

    function addOptionToManager() {
        const cat = document.getElementById('manageCategorySelect').value;
        const newVal = prompt("Nhập tên option mới:");
        if(newVal && newVal.trim() !== "") {
            if(!globalOptions[cat]) globalOptions[cat] = [];
            globalOptions[cat].push(newVal.trim());
            optionsRef.update({ [cat]: globalOptions[cat] });
            showToast("➕ Đã thêm option mới!");
        }
    }

    // --- TÍNH NĂNG THEMES & ANIMATIONS ---
    let animActive = true;
    let particleInterval;
    
    const themeConfig = {
        pastel: { emoji: '🌸', speed: 2, size: 20 }, winter: { emoji: '❄️', speed: 3, size: 15 },
        galaxy: { emoji: '✨', speed: 1.5, size: 25 }, forest: { emoji: '🍃', speed: 2.5, size: 18 },
        sunset: { emoji: '☁️', speed: 1, size: 40 }, ocean: { emoji: '🫧', speed: 2, size: 20 },
        cyberpunk: { emoji: '👾', speed: 4, size: 20 }, halloween: { emoji: '🦇', speed: 3, size: 25 },
        valentine: { emoji: '💖', speed: 2, size: 20 }, spring: { emoji: '🌷', speed: 2, size: 22 },
        neon: { emoji: '🚥', speed: 1.5, size: 20 }, coffee: { emoji: '☕', speed: 3, size: 22 },
        desert: { emoji: '🌵', speed: 2.5, size: 25 }, space: { emoji: '🚀', speed: 1, size: 30 },
        candy: { emoji: '🍬', speed: 2.2, size: 20 }, gothic: { emoji: '🕸️', speed: 3, size: 25 },
        retro: { emoji: '📻', speed: 2, size: 28 }, magic: { emoji: '🔮', speed: 1.8, size: 24 },
        fruit: { emoji: '🍉', speed: 2.5, size: 22 }, monochrome: { emoji: '⚪', speed: 3, size: 15 }
    };

    function changeTheme(themeName) {
        document.body.setAttribute('data-theme', themeName);
        clearParticles();
        if(animActive) startAnimation(themeName);
        showToast("🎨 Đã đổi giao diện thành công!");
    }

    function toggleAnimation() {
        animActive = !animActive;
        const btn = document.getElementById('animBtn');
        if (animActive) {
            btn.innerHTML = "✨ Tắt Hiệu Ứng";
            startAnimation(document.getElementById('themeSelect').value);
            showToast("✨ Đã bật hiệu ứng hạt rơi!");
        } else {
            btn.innerHTML = "✨ Bật Hiệu Ứng";
            clearParticles();
            showToast("⏸️ Đã tắt hiệu ứng hạt rơi!");
        }
    }

    function clearParticles() { clearInterval(particleInterval); document.getElementById('particles').innerHTML = ''; }

    function startAnimation(themeName) {
        clearParticles();
        const config = themeConfig[themeName];
        if(!config) return;

        particleInterval = setInterval(() => {
            const p = document.createElement('div');
            p.className = 'particle';
            p.innerText = config.emoji;
            
            const startX = Math.random() * 100;
            const duration = Math.random() * 3 + (7 / config.speed);
            const size = Math.random() * 10 + config.size;
            
            p.style.left = startX + 'vw';
            p.style.fontSize = size + 'px';
            p.style.animationDuration = duration + 's';

            document.getElementById('particles').appendChild(p);
            setTimeout(() => p.remove(), duration * 1000);
        }, 300);
    }

    startAnimation('pastel');
</script>

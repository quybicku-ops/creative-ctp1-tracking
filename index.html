<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟 Creative Task Manager Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        /* CSS Variables cho Theme Default (Pastel) */
        :root {
            --primary: #FFB7B2; 
            --secondary: #E2F0CB; 
            --accent: #B5EAD7; 
            --bg: #F9F9FB;
            --text: #4A4A4A;
            --border: rgba(255, 255, 255, 0.4);
            --container-bg: rgba(255, 255, 255, 0.85);
            --th-bg: rgba(255, 240, 245, 0.9);
            --th-color: #D81B60;
        }

        /* 10 Themes Colors */
        [data-theme="winter"] { --primary: #81d4fa; --bg: #e0f7fa; --text: #01579b; --container-bg: rgba(255,255,255,0.7); --th-bg: #b3e5fc; --th-color: #0277bd; }
        [data-theme="galaxy"] { --primary: #ce93d8; --bg: #0b1d3a; --text: #f3e5f5; --container-bg: rgba(20,20,50,0.8); --th-bg: #4a148c; --th-color: #ea80fc; --border: rgba(255,255,255,0.1); }
        [data-theme="forest"] { --primary: #aed581; --bg: #e8f5e9; --text: #1b5e20; --container-bg: rgba(255,255,255,0.8); --th-bg: #c8e6c9; --th-color: #2e7d32; }
        [data-theme="sunset"] { --primary: #ffab91; --bg: #fbe9e7; --text: #bf360c; --container-bg: rgba(255,255,255,0.8); --th-bg: #ffccbc; --th-color: #d84315; }
        [data-theme="ocean"] { --primary: #4dd0e1; --bg: #e0f2f1; --text: #004d40; --container-bg: rgba(255,255,255,0.8); --th-bg: #b2dfdb; --th-color: #00695c; }
        [data-theme="cyberpunk"] { --primary: #00e5ff; --bg: #212121; --text: #eeff41; --container-bg: rgba(30,30,30,0.85); --th-bg: #311b92; --th-color: #18ffff; --border: #333; }
        [data-theme="halloween"] { --primary: #ff9800; --bg: #3e2723; --text: #ffe0b2; --container-bg: rgba(0,0,0,0.6); --th-bg: #bf360c; --th-color: #ffb300; }
        [data-theme="valentine"] { --primary: #f48fb1; --bg: #fce4ec; --text: #880e4f; --container-bg: rgba(255,255,255,0.85); --th-bg: #f8bbd0; --th-color: #c2185b; }
        [data-theme="spring"] { --primary: #fff59d; --bg: #f1f8e9; --text: #33691e; --container-bg: rgba(255,255,255,0.85); --th-bg: #dcedc8; --th-color: #558b2f; }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            transition: background-color 0.5s ease, color 0.5s ease;
            overflow-x: hidden;
            /* Tối ưu render font trên MacOS/Safari */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Vùng chứa hạt Animation */
        #particles {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            animation: fall linear infinite;
            opacity: 0.7;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* Glassmorphism Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: var(--container-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px); /* Cho Safari */
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        /* Control Panel */
        .controls-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            align-items: center;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        h1 { margin: 0; color: var(--primary); font-size: 28px; }

        .stats {
            background: rgba(255, 255, 255, 0.5);
            padding: 8px 15px;
            border-radius: 12px;
            font-weight: bold;
        }

        /* Nút bấm - Tối ưu cho Safari */
        .btn {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 10px 18px;
            border-radius: 12px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            color: var(--bg);
            /* Ép Safari bỏ style mặc định của nút */
            -webkit-appearance: none;
            appearance: none;
        }
        
        [data-theme="galaxy"] .btn, [data-theme="cyberpunk"] .btn, [data-theme="halloween"] .btn {
            color: white;
        }

        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .btn-small { padding: 5px 10px; font-size: 12px; margin: 2px; }
        .btn-hide { background: #B0BEC5; }
        .btn-delete { background: #EF5350; color: white; }

        select.theme-select {
            padding: 10px 30px 10px 10px;
            border-radius: 12px;
            border: 1px solid var(--primary);
            background: var(--container-bg);
            color: var(--text);
            font-weight: bold;
            cursor: pointer;
            /* Fix Safari Dropdown */
            -webkit-appearance: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 15px;
        }

        /* Bảng & Resize Cột */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 15px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.1);
        }

        table { width: 100%; border-collapse: collapse; text-align: left; }

        th, td { padding: 10px 12px; border-bottom: 1px solid var(--border); }

        th {
            background-color: var(--th-bg);
            color: var(--th-color);
            font-weight: 800;
            white-space: nowrap;
            resize: horizontal;
            overflow: auto;
            cursor: pointer;
            position: relative;
            user-select: none;
        }

        th:hover { filter: brightness(0.95); }
        
        /* Icon sort */
        .sort-icon { font-size: 12px; margin-left: 5px; opacity: 0.5; }
        .sort-icon.active { opacity: 1; }

        tr.is-hidden-row { opacity: 0.4; background-color: rgba(0,0,0,0.05); }
        tr:hover td { background-color: rgba(255, 255, 255, 0.2); }

        /* Form Inputs - Fix Safari */
        input[type="text"], input[type="date"], select.data-input {
            width: 100%;
            border: 1px solid transparent;
            background: rgba(255,255,255,0.4);
            font-family: inherit;
            color: var(--text);
            border-radius: 8px;
            transition: all 0.2s;
            box-sizing: border-box;
            /* Fix triệt để Safari */
            -webkit-appearance: none;
            appearance: none;
            -webkit-box-shadow: none;
            box-shadow: none;
        }

        input[type="text"], input[type="date"] {
            padding: 8px;
        }

        /* Fix Select Box cho Safari */
        select.data-input {
            padding: 8px 25px 8px 8px; /* Chừa viền phải cho mũi tên */
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 8px center;
            background-size: 14px;
        }

        input[type="text"]:focus, select.data-input:focus, input[type="date"]:focus {
            outline: none;
            border: 1px solid var(--primary);
            background: var(--container-bg);
        }

        input:disabled, select:disabled { opacity: 0.7; cursor: not-allowed; }

        /* Checkbox */
        input[type="checkbox"] { 
            width: 22px; 
            height: 22px; 
            accent-color: var(--primary); 
            cursor: pointer;
        }

        .col-stt { width: 60px; text-align: center; }
        .col-action { min-width: 120px; text-align: center; }

        #loader { text-align: center; padding: 50px; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body data-theme="pastel">

<div id="particles"></div>

<div class="container">
    <div class="header">
        <h1>✨ Creative Task Manager</h1>
        <div class="stats" id="statsDisplay">Đang tải dữ liệu...</div>
    </div>

    <div class="controls-panel">
        <button class="btn" onclick="addNewTask()" id="addBtn">➕ Thêm Task Mới</button>
        <button class="btn" id="lockBtn" onclick="toggleLock()">🔓 Đang Mở Edit</button>
        <button class="btn" id="showHiddenBtn" onclick="toggleShowHidden()">👁️ Đang Ẩn Task Đã Xóa</button>
        
        <select class="theme-select" id="themeSelect" onchange="changeTheme(this.value)">
            <option value="pastel">🌸 Theme: Pastel (Mặc định)</option>
            <option value="winter">❄️ Theme: Mùa Đông</option>
            <option value="galaxy">🌌 Theme: Dải Ngân Hà</option>
            <option value="forest">🍃 Theme: Rừng Xanh</option>
            <option value="sunset">🌅 Theme: Hoàng Hôn</option>
            <option value="ocean">🫧 Theme: Đại Dương</option>
            <option value="cyberpunk">⚡ Theme: Cyberpunk</option>
            <option value="halloween">🎃 Theme: Halloween</option>
            <option value="valentine">💖 Theme: Valentine</option>
            <option value="spring">🌷 Theme: Mùa Xuân</option>
        </select>
        
        <button class="btn" id="animBtn" onclick="toggleAnimation()">✨ Tắt Hiệu Ứng</button>
    </div>

    <div id="loader">Đang kết nối Firebase... 🚀</div>

    <div class="table-wrapper" id="tableContainer" style="display: none;">
        <table>
            <thead>
                <tr>
                    <th class="col-stt">STT</th>
                    <th onclick="setSort('pillar')">🏷️ Pillar/Type <span class="sort-icon" id="sort-pillar">↕</span></th>
                    <th onclick="setSort('concept')">📝 Tên Concept <span class="sort-icon" id="sort-concept">↕</span></th>
                    <th onclick="setSort('link')">🔗 Link Thành Phẩm <span class="sort-icon" id="sort-link">↕</span></th>
                    <th onclick="setSort('ready')" style="text-align: center;">✅ Ready? <span class="sort-icon" id="sort-ready">↕</span></th>
                    <th onclick="setSort('format')">🎨 Format <span class="sort-icon" id="sort-format">↕</span></th>
                    <th onclick="setSort('pic')">🧑‍💻 PIC <span class="sort-icon" id="sort-pic">↕</span></th>
                    <th onclick="setSort('deadline')">📅 Deadline <span class="sort-icon" id="sort-deadline">↕</span></th>
                    <th class="col-action">⚙️ Thao tác</th>
                </tr>
            </thead>
            <tbody id="taskTableBody"></tbody>
        </table>
    </div>
</div>

<script>
    // 1. Cấu hình Firebase
    const firebaseConfig = {
        databaseURL: "https://creatives-ctp1-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // Tham chiếu Data
    const tasksRef = db.ref('tasks');
    const optionsRef = db.ref('settings/options');

    // States Toàn Cục
    let rawTasksData = {};
    let isLocked = false;
    let isShowingHidden = false;
    let currentSort = { field: 'deadline', asc: true };
    
    // Tùy chọn mặc định cho Dropdown
    let globalOptions = {
        pillar: ["Research", "AI Gen", "Branding", "Design", "Social", "Production", "Animation", "Anime", "Khác"],
        format: ["Banner", "Video", "Image", "Chưa rõ"],
        pic: ["Bảo", "Lam", "Cả hai", "Chưa có"]
    };

    // DOM Elements
    const tableBody = document.getElementById('taskTableBody');
    const loader = document.getElementById('loader');
    const tableContainer = document.getElementById('tableContainer');
    const statsDisplay = document.getElementById('statsDisplay');

    // 2. Lấy tùy chọn Dropdown từ Firebase
    optionsRef.on('value', (snapshot) => {
        if(snapshot.exists()) {
            globalOptions = snapshot.val();
        } else {
            optionsRef.set(globalOptions);
        }
        renderTable();
    });

    // 3. Lắng nghe dữ liệu Task Realtime
    tasksRef.on('value', (snapshot) => {
        rawTasksData = snapshot.val() || {};
        renderTable();
    });

    // Hàm tạo mã HTML cho các dropdown
    function getOptionsHtml(type, selectedValue) {
        let html = globalOptions[type].map(opt => 
            `<option value="${opt}" ${opt === selectedValue ? 'selected' : ''}>${opt}</option>`
        ).join('');
        html += `<option value="__add_new__">➕ Thêm mới...</option>`;
        if (selectedValue && !globalOptions[type].includes(selectedValue) && selectedValue !== "__add_new__") {
            html = `<option value="${selectedValue}" selected>${selectedValue}</option>` + html;
        }
        if (!selectedValue) html = `<option value="" selected>-- Chọn --</option>` + html;
        return html;
    }

    // Hàm xử lý khi chọn Dropdown
    function handleSelectChange(id, field, selectElement) {
        if (selectElement.value === "__add_new__") {
            let newVal = prompt(`Nhập tùy chọn mới cho cột ${field}:`);
            if (newVal && newVal.trim() !== "") {
                newVal = newVal.trim();
                if (!globalOptions[field].includes(newVal)) {
                    globalOptions[field].push(newVal);
                    optionsRef.update({ [field]: globalOptions[field] });
                }
                updateTask(id, field, newVal);
            } else {
                renderTable(); 
            }
        } else {
            updateTask(id, field, selectElement.value);
        }
    }

    // 4. Các tính năng Toggle
    function toggleLock() {
        isLocked = !isLocked;
        document.getElementById('lockBtn').innerHTML = isLocked ? "🔒 Đã Khóa Edit" : "🔓 Đang Mở Edit";
        document.getElementById('lockBtn').style.background = isLocked ? "#9E9E9E" : "var(--primary)";
        document.getElementById('addBtn').disabled = isLocked;
        renderTable();
    }

    function toggleShowHidden() {
        isShowingHidden = !isShowingHidden;
        document.getElementById('showHiddenBtn').innerHTML = isShowingHidden ? "🙈 Đang Hiện Task Đã Xóa" : "👁️ Đang Ẩn Task Đã Xóa";
        renderTable();
    }

    function setSort(field) {
        if (currentSort.field === field) {
            currentSort.asc = !currentSort.asc;
        } else {
            currentSort.field = field;
            currentSort.asc = true;
        }
        document.querySelectorAll('.sort-icon').forEach(el => { el.innerText = '↕'; el.classList.remove('active'); });
        const activeIcon = document.getElementById('sort-' + field);
        if(activeIcon) {
            activeIcon.innerText = currentSort.asc ? '⬆' : '⬇';
            activeIcon.classList.add('active');
        }
        renderTable();
    }

    // 5. Render Bảng Chính
    function renderTable() {
        if (Object.keys(rawTasksData).length === 0 && !loader.style.display) return;
        
        loader.style.display = 'none';
        tableContainer.style.display = 'block';

        let tasksArray = Object.entries(rawTasksData).map(([id, task]) => ({ id, ...task }));

        if (!isShowingHidden) {
            tasksArray = tasksArray.filter(t => !t.isHidden);
        }

        const total = tasksArray.length;
        const readyCount = tasksArray.filter(t => t.ready).length;
        statsDisplay.innerHTML = `Đã xong: ${readyCount} / ${total} 🚀`;

        tasksArray.sort((a, b) => {
            let valA = a[currentSort.field] || "";
            let valB = b[currentSort.field] || "";
            if (currentSort.field === 'ready') { valA = a.ready ? 1 : 0; valB = b.ready ? 1 : 0; }
            if (valA < valB) return currentSort.asc ? -1 : 1;
            if (valA > valB) return currentSort.asc ? 1 : -1;
            return 0;
        });

        tableBody.innerHTML = '';
        if(tasksArray.length === 0) {
             tableBody.innerHTML = `<tr><td colspan="9" style="text-align:center;">Chưa có task nào để hiển thị! 🥺</td></tr>`;
             return;
        }

        tasksArray.forEach((task, index) => {
            const tr = document.createElement('tr');
            if (task.isHidden) tr.classList.add('is-hidden-row');
            const dis = isLocked ? 'disabled' : '';

            tr.innerHTML = `
                <td class="col-stt"><strong>${index + 1}</strong></td>
                
                <td>
                    <select class="data-input" ${dis} onchange="handleSelectChange('${task.id}', 'pillar', this)">
                        ${getOptionsHtml('pillar', task.pillar)}
                    </select>
                </td>

                <td>
                    <input type="text" ${dis} value="${task.concept || ''}" placeholder="Nhập concept..." 
                           onblur="updateTask('${task.id}', 'concept', this.value)">
                </td>

                <td>
                    <input type="text" ${dis} value="${task.link || ''}" placeholder="Link..." 
                           onblur="updateTask('${task.id}', 'link', this.value)">
                </td>

                <td style="text-align: center;">
                    <input type="checkbox" ${dis} ${task.ready ? 'checked' : ''} 
                           onchange="updateTask('${task.id}', 'ready', this.checked)">
                </td>

                <td>
                    <select class="data-input" ${dis} onchange="handleSelectChange('${task.id}', 'format', this)">
                        ${getOptionsHtml('format', task.format)}
                    </select>
                </td>

                <td>
                    <select class="data-input" ${dis} onchange="handleSelectChange('${task.id}', 'pic', this)">
                        ${getOptionsHtml('pic', task.pic)}
                    </select>
                </td>

                <td>
                    <input type="date" ${dis} value="${task.deadline || ''}" 
                           onchange="updateTask('${task.id}', 'deadline', this.value)">
                </td>

                <td class="col-action">
                    <button class="btn btn-small btn-hide" ${dis} onclick="toggleHideTask('${task.id}', ${task.isHidden})">
                        ${task.isHidden ? 'Khôi phục' : 'Ẩn'}
                    </button>
                    <button class="btn btn-small btn-delete" ${dis} onclick="deleteTask('${task.id}')">Xóa</button>
                </td>
            `;
            tableBody.appendChild(tr);
        });
    }

    // 6. DB Operations
    function updateTask(id, field, value) {
        if(isLocked) return;
        db.ref('tasks/' + id).update({ [field]: value });
    }

    function addNewTask() {
        if(isLocked) return;
        tasksRef.push({
            pillar: "Khác", concept: "", link: "", ready: false,
            format: "Chưa rõ", pic: "", deadline: "", isHidden: false
        });
    }

    function toggleHideTask(id, currentStatus) {
        if(isLocked) return;
        db.ref('tasks/' + id).update({ isHidden: !currentStatus });
    }

    function deleteTask(id) {
        if(isLocked) return;
        if (confirm("Xóa vĩnh viễn task này? (Khuyên dùng nút Ẩn thay vì Xóa) 🥺")) {
            db.ref('tasks/' + id).remove();
        }
    }

    // 7. THEMES & ANIMATIONS
    let animActive = true;
    let particleInterval;
    
    const themeConfig = {
        pastel: { emoji: '🌸', speed: 2, size: 20 },
        winter: { emoji: '❄️', speed: 3, size: 15 },
        galaxy: { emoji: '✨', speed: 1.5, size: 25 },
        forest: { emoji: '🍃', speed: 2.5, size: 18 },
        sunset: { emoji: '☁️', speed: 1, size: 40 },
        ocean: { emoji: '🫧', speed: 2, size: 20 },
        cyberpunk: { emoji: '👾', speed: 4, size: 20 },
        halloween: { emoji: '🦇', speed: 3, size: 25 },
        valentine: { emoji: '💖', speed: 2, size: 20 },
        spring: { emoji: '🌷', speed: 2, size: 22 }
    };

    function changeTheme(themeName) {
        document.body.setAttribute('data-theme', themeName);
        clearParticles();
        if(animActive) startAnimation(themeName);
    }

    function toggleAnimation() {
        animActive = !animActive;
        const btn = document.getElementById('animBtn');
        if (animActive) {
            btn.innerHTML = "✨ Tắt Hiệu Ứng";
            const currentTheme = document.getElementById('themeSelect').value;
            startAnimation(currentTheme);
        } else {
            btn.innerHTML = "✨ Bật Hiệu Ứng";
            clearParticles();
        }
    }

    function clearParticles() {
        clearInterval(particleInterval);
        document.getElementById('particles').innerHTML = '';
    }

    function startAnimation(themeName) {
        clearParticles();
        const config = themeConfig[themeName];
        if(!config) return;

        particleInterval = setInterval(() => {
            const p = document.createElement('div');
            p.className = 'particle';
            p.innerText = config.emoji;
            
            const startX = Math.random() * 100;
            const duration = Math.random() * 3 + (7 / config.speed);
            const size = Math.random() * 10 + config.size;
            
            p.style.left = startX + 'vw';
            p.style.fontSize = size + 'px';
            p.style.animationDuration = duration + 's';

            document.getElementById('particles').appendChild(p);
            setTimeout(() => { p.remove(); }, duration * 1000);
        }, 300);
    }

    startAnimation('pastel');

</script>
</body>
</html>
